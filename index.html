<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kuroko No Basket — Final Form Engine</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;background:#000;overflow:hidden;font-family:Arial}
canvas{display:block}
#hud{
position:fixed;top:10px;left:0;right:0;text-align:center;
color:#0ff;font-size:18px;text-shadow:0 0 12px cyan;z-index:10}
#menu{
position:fixed;inset:0;background:radial-gradient(circle,#111,#000);
display:flex;flex-direction:column;justify-content:center;
align-items:center;color:#fff;z-index:20}
button{
padding:14px 30px;margin:10px;border:none;border-radius:30px;
font-size:18px;color:#fff;cursor:pointer;
background:linear-gradient(45deg,#ff004c,#ff7b00);
box-shadow:0 0 20px rgba(255,0,80,1)}
</style>
</head>

<body>

<div id="menu">
<h1>⚫ KUROKO NO BASKET — FINAL FORM ⚫</h1>
<p>Select Your Legend</p>
<button onclick="start('kuroko')">Kuroko — Phantom Shadow</button>
<button onclick="start('kagami')">Kagami — Zone Beast</button>
<button onclick="start('midorima')">Midorima — Full Court Sniper</button>
<button onclick="start('akashi')">Akashi — Emperor Eye</button>
</div>

<div id="hud"></div>
<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;
window.onresize=()=>{canvas.width=innerWidth;canvas.height=innerHeight};

let character="kuroko";
let game=false;
function start(c){character=c;menu.style.display="none";game=true}

const keys={};
addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

class Player{
constructor(x,y,user=false){
this.x=x;this.y=y;
this.vx=0;this.vy=0;
this.speed=4;
this.user=user;
this.energy=100;
this.zone=false;
}
update(){
if(this.user){
this.vx=(keys.a?-1:0)+(keys.d?1:0);
this.vy=(keys.w?-1:0)+(keys.s?1:0);
let sp=this.speed*(this.zone?2:1);
this.x+=this.vx*sp;
this.y+=this.vy*sp;
}
this.x=Math.max(50,Math.min(world.w-50,this.x));
this.y=Math.max(80,Math.min(world.h-80,this.y));
}
}

const world={w:2400,h:1200};

const player=new Player(300,world.h/2,true);

const teamA=[player];
for(let i=0;i<4;i++)teamA.push(new Player(300,300+i*160));

const teamB=[];
for(let i=0;i<5;i++)teamB.push(new Player(world.w-300,300+i*160));

const ball={x:player.x,y:player.y,dx:0,dy:0,shot:false,owner:player};

const hoopA={x:120,y:world.h/2,r:35};
const hoopB={x:world.w-120,y:world.h/2,r:35};

let cam={x:0,y:0};
let scoreA=0,scoreB=0;
let slow=1;

// Abilities
function special(){
if(player.energy<30)return;
player.energy-=30;

if(character==="kuroko"){
player.zone=true;
setTimeout(()=>player.zone=false,1500);
}
if(character==="kagami"){
ball.dx*=2;
ball.dy*=2;
}
if(character==="midorima"){
ball.dx=26;
ball.dy=(hoopB.y-ball.y)/10;
}
if(character==="akashi"){
slow=0.35;
setTimeout(()=>slow=1,1200);
}
}

function shoot(){
if(ball.shot)return;
ball.shot=true;
let p=14;
if(character==="kagami")p=18;
if(character==="midorima")p=24;
ball.dx=p;
ball.dy=(hoopB.y-ball.y)/14;
}

addEventListener("keydown",e=>{
if(e.code==="Space")shoot();
if(e.key==="q")special();
});

function ai(p){
let dx=ball.x-p.x;
let dy=ball.y-p.y;
let d=Math.hypot(dx,dy);
if(d>5){
p.x+=dx/d*2.4*slow;
p.y+=dy/d*2.4*slow;
}
}

function update(){
if(!game)return;

teamA.forEach(p=>p.update());
teamB.forEach(ai);

cam.x=player.x-canvas.width/2;
cam.y=player.y-canvas.height/2;
cam.x=Math.max(0,Math.min(world.w-canvas.width,cam.x));
cam.y=Math.max(0,Math.min(world.h-canvas.height,cam.y));

if(!ball.shot){
ball.x=ball.owner.x;
ball.y=ball.owner.y;
}else{
ball.x+=ball.dx*slow;
ball.y+=ball.dy*slow;
if(Math.hypot(ball.x-hoopB.x,ball.y-hoopB.y)<hoopB.r){
scoreA++;
ball.shot=false;
player.energy=Math.min(100,player.energy+20);
}
}
}

function drawCourt(){
ctx.fillStyle="#050505";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.strokeStyle="#222";
ctx.lineWidth=5;
ctx.strokeRect(40-cam.x,40-cam.y,world.w-80,world.h-80);
}

function aura(x,y,r,c){
ctx.beginPath();
ctx.arc(x-cam.x,y-cam.y,r,0,Math.PI*2);
ctx.fillStyle=c;
ctx.fill();
}

function drawPlayer(p,user=true){
if(user){
if(character==="kuroko")aura(p.x,p.y,40,"rgba(0,255,255,.25)");
if(character==="kagami")aura(p.x,p.y,42,"rgba(255,80,0,.3)");
if(character==="akashi")aura(p.x,p.y,44,"rgba(255,0,0,.25)");
}

ctx.fillStyle=user?"#0ff":"#f33";
ctx.beginPath();
ctx.arc(p.x-cam.x,p.y-cam.y,18,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="#fff";
ctx.fillRect(p.x-cam.x-6,p.y-cam.y-28,12,22);
}

function draw(){
if(!game)return;

drawCourt();

ctx.beginPath();
ctx.arc(hoopB.x-cam.x,hoopB.y-cam.y,hoopB.r,0,Math.PI*2);
ctx.strokeStyle="red";ctx.lineWidth=4;ctx.stroke();

teamA.forEach(p=>drawPlayer(p,true));
teamB.forEach(p=>drawPlayer(p,false));

ctx.beginPath();
ctx.arc(ball.x-cam.x,ball.y-cam.y,7,0,Math.PI*2);
ctx.fillStyle="orange";
ctx.fill();

hud.innerHTML=`⚫ ${character.toUpperCase()} — SCORE ${scoreA}
<br>ENERGY ${Math.floor(player.energy)}%
<br>[WASD] Move | [SPACE] Shoot | [Q] Special`;
}

function loop(){
update();
draw();
requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
