<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>THE SHADOW — KUROKO NO BASKET ENGINE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;background:#000;overflow:hidden;font-family:Arial}
canvas{display:block}
#hud{
position:fixed;top:10px;left:0;right:0;
text-align:center;color:#0ff;font-size:18px;
text-shadow:0 0 12px cyan;z-index:10;
}
#menu{
position:fixed;inset:0;
background:radial-gradient(circle,#111,#000);
display:flex;flex-direction:column;
justify-content:center;align-items:center;
color:#fff;z-index:20;
}
button{
padding:14px 28px;margin:10px;
border:none;border-radius:30px;
font-size:18px;color:#fff;cursor:pointer;
background:linear-gradient(45deg,#00f,#0ff);
box-shadow:0 0 15px cyan;
}
</style>
</head>

<body>

<div id="menu">
<h1>⚫ KUROKO NO BASKET — SHADOW ENGINE ⚫</h1>
<p>Select Character</p>
<button onclick="selectChar('kuroko')">Kuroko — Phantom Shadow</button>
<button onclick="selectChar('kagami')">Kagami — Zone Dunker</button>
<button onclick="selectChar('midorima')">Midorima — Full Court Sniper</button>
<button onclick="selectChar('akashi')">Akashi — Emperor Eye</button>
</div>

<div id="hud"></div>
<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;
window.onresize=()=>{canvas.width=innerWidth;canvas.height=innerHeight};

let gameStarted=false;
let character="kuroko";

function selectChar(c){
character=c;
document.getElementById("menu").style.display="none";
gameStarted=true;
}

// SPRITES
const sprites={
kuroko:new Image(),
kagami:new Image(),
midorima:new Image(),
akashi:new Image(),
ball:new Image()
};

sprites.kuroko.src="https://i.imgur.com/Rq6GQWa.png";
sprites.kagami.src="https://i.imgur.com/H4Y1X4V.png";
sprites.midorima.src="https://i.imgur.com/yUsQ0aM.png";
sprites.akashi.src="https://i.imgur.com/sS4Q6Ln.png";
sprites.ball.src="https://i.imgur.com/WsK4N6k.png";

const keys={};
addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

class Player{
constructor(x,y,isUser=false){
this.x=x;this.y=y;
this.speed=5;
this.isUser=isUser;
this.zone=false;
}
move(){
if(!this.isUser)return;
let sp=this.speed;
if(this.zone)sp=9;
if(keys.w)this.y-=sp;
if(keys.s)this.y+=sp;
if(keys.a)this.x-=sp;
if(keys.d)this.x+=sp;
this.x=Math.max(50,Math.min(canvas.width-50,this.x));
this.y=Math.max(80,Math.min(canvas.height-80,this.y));
}
}

const player=new Player(150,canvas.height/2,true);

const enemies=[];
for(let i=0;i<4;i++){
enemies.push(new Player(canvas.width-300,150+i*120,false));
}

const ball={x:player.x,y:player.y,dx:0,dy:0,shot:false,owner:player};

const hoop={x:canvas.width-120,y:()=>canvas.height/2,r:30};

let score=0;

// SPECIAL ABILITIES
function activateSpecial(){
if(character==="kuroko"){
player.zone=true;
setTimeout(()=>player.zone=false,1500);
}
if(character==="kagami"){
ball.dx*=1.8;
ball.dy*=1.8;
}
if(character==="akashi"){
enemies.forEach(e=>{
e.x+=Math.random()*120-60;
e.y+=Math.random()*120-60;
});
}
}

addEventListener("keydown",e=>{
if(e.code==="Space")shoot();
if(e.key==="q")activateSpecial();
});

function shoot(){
if(ball.shot)return;
ball.shot=true;
let power=character==="midorima"?22:character==="kagami"?17:13;
ball.dx=power;
ball.dy=(hoop.y()-ball.y)/14;
}

// AI DEFENSE
function aiMove(p){
let dx=player.x-p.x;
let dy=player.y-p.y;
let dist=Math.hypot(dx,dy);
if(dist>5){
p.x+=dx/dist*2.5;
p.y+=dy/dist*2.5;
}
}

function update(){
if(!gameStarted)return;

player.move();
enemies.forEach(aiMove);

if(!ball.shot){
ball.x=player.x+20;
ball.y=player.y+20;
}else{
ball.x+=ball.dx;
ball.y+=ball.dy;
if(Math.hypot(ball.x-hoop.x,ball.y-hoop.y())<hoop.r){
score++;
ball.shot=false;
}
}
}

function drawCourt(){
ctx.fillStyle="#050505";
ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.strokeStyle="#222";
ctx.lineWidth=4;
ctx.strokeRect(30,30,canvas.width-60,canvas.height-60);
}

function drawHoop(){
ctx.beginPath();
ctx.arc(hoop.x,hoop.y(),hoop.r,0,Math.PI*2);
ctx.strokeStyle="red";
ctx.lineWidth=4;
ctx.stroke();
}

function drawPlayer(p,isUser=true){
let img=sprites[character];
if(!isUser)img=sprites.kagami;
ctx.drawImage(img,p.x-32,p.y-48,64,96);
}

function draw(){
if(!gameStarted)return;
drawCourt();
drawHoop();

drawPlayer(player,true);
enemies.forEach(e=>drawPlayer(e,false));

ctx.drawImage(sprites.ball,ball.x-8,ball.y-8,16,16);

hud.innerHTML=`⚫ ${character.toUpperCase()} MODE — SCORE: ${score} <br>
WASD Move | SPACE Shoot | Q Special Ability`;
}

function loop(){
update();
draw();
requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
