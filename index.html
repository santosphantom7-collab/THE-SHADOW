<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kuroko No Basket – GOD ENGINE V2</title>
<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }
#hud {
 position:fixed;
 top:10px;
 left:10px;
 color:white;
 font-family:Arial;
 background:rgba(0,0,0,.6);
 padding:10px;
 border-radius:8px;
}
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="hud">
<b>Kuroko No Basket – GOD ENGINE V2</b><br>
Player: <span id="pname">Kagami</span><br>
Mode: <span id="mode">Normal</span><br>
Special: <span id="sp">100</span><br><br>
WASD Move | J Shoot | K Pass | L Special | TAB Switch | G God Mode | Z Zone Mode
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = innerWidth;
canvas.height = innerHeight;

const cam = {x:0,y:0};
let god=false;
let zone=false;

class Player{
  constructor(name,x,y,team,color){
    this.name=name;
    this.x=x;
    this.y=y;
    this.vx=0;
    this.vy=0;
    this.speed=3;
    this.team=team;
    this.color=color;
    this.r=16;
    this.special=100;
  }

  update(){
    this.x+=this.vx;
    this.y+=this.vy;
  }

  draw(){
    ctx.beginPath();
    ctx.fillStyle=this.color;
    ctx.arc(this.x-cam.x,this.y-cam.y,this.r,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle="white";
    ctx.font="12px Arial";
    ctx.fillText(this.name,this.x-cam.x-20,this.y-cam.y-22);
  }
}

const teamA=["Kagami","Kuroko","Hyuga","Izuki","Kiyoshi"];
const teamB=["Akashi","Aomine","Midorima","Murasakibara","Kise"];

const players=[];

teamA.forEach((n,i)=>players.push(new Player(n,300,200+i*80,"A","red")));
teamB.forEach((n,i)=>players.push(new Player(n,1100,200+i*80,"B","cyan")));

let active=0;

const ball={x:600,y:400,vx:0,vy:0,owner:0};

const keys={};
addEventListener("keydown",e=>{
  keys[e.key.toLowerCase()]=true;

  if(e.key==="Tab"){
    e.preventDefault();
    active=(active+1)%5;
    document.getElementById("pname").innerText=players[active].name;
  }

  if(e.key==="g"){
    god=!god;
    document.getElementById("mode").innerText=god?"GOD":"Normal";
  }

  if(e.key==="z"){
    zone=!zone;
    document.getElementById("mode").innerText=zone?"ZONE":"Normal";
  }
});

addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

function control(){
  const p=players[active];
  let s=zone?6:(god?9:3);

  p.vx=p.vy=0;
  if(keys.w) p.vy=-s;
  if(keys.s) p.vy=s;
  if(keys.a) p.vx=-s;
  if(keys.d) p.vx=s;

  if(keys.j) shoot(p);
  if(keys.k) pass(p);
  if(keys.l) special(p);

  ball.x=p.x;
  ball.y=p.y;
}

function shoot(p){
  ball.vx=god?20:12;
  ball.vy=-14;
}

function pass(p){
  let t=(active+1)%5;
  ball.owner=t;
}

function special(p){
  if(p.special<=0) return;
  p.special-=10;

  if(p.name==="Kagami"){ ball.vx=25; ball.vy=-30; }
  if(p.name==="Kuroko"){ ball.owner=(active+2)%5; }
  if(p.name==="Aomine"){ ball.vx=30; ball.vy=-18; }
  if(p.name==="Akashi"){ players.forEach(pl=>pl.speed=2); }
  if(p.name==="Midorima"){ ball.vx=15; ball.vy=-40; }
}

function aiControl(){
  players.forEach((p,i)=>{
    if(i>=5){
      p.vx=Math.sin(Date.now()/500+i)*2;
      p.vy=Math.cos(Date.now()/700+i)*2;
    }
  });
}

function cameraFollow(){
  const p=players[active];
  cam.x=p.x-canvas.width/2;
  cam.y=p.y-canvas.height/2;
}

function drawCourt(){
  ctx.fillStyle="#124";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.strokeStyle="white";
  ctx.lineWidth=4;
  ctx.strokeRect(-cam.x+100,-cam.y+100,1400,700);
}

function drawBall(){
  ctx.beginPath();
  ctx.fillStyle="orange";
  ctx.arc(ball.x-cam.x,ball.y-cam.y,8,0,Math.PI*2);
  ctx.fill();
}

function update(){
  control();
  aiControl();
  players.forEach(p=>p.update());
  cameraFollow();
}

function render(){
  drawCourt();
  players.forEach(p=>p.draw());
  drawBall();
  document.getElementById("sp").innerText=players[active].special;
}

function loop(){
  update();
  render();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
