<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>THE SHADOW — Street Basketball</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  background:#050505;
  overflow:hidden;
  font-family:Arial, sans-serif;
}

canvas {
  display:block;
}

.ui {
  position:fixed;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  color:#fff;
  text-align:center;
  z-index:10;
}

.ui h1 {
  font-size:22px;
  margin:0;
}

.ui p {
  font-size:14px;
  opacity:.8;
}

</style>
</head>

<body>

<div class="ui">
  <h1>⚫ THE SHADOW — STREET BASKETBALL</h1>
  <p>Move: WASD | Shoot: SPACE | Dribble: Q | Dash: SHIFT</p>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.onresize = () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

const player = {
  x: 200,
  y: canvas.height/2,
  r: 18,
  speed: 5,
  color: "#00ffff"
};

const ball = {
  x: player.x,
  y: player.y,
  r: 8,
  dx: 0,
  dy: 0,
  shot: false
};

const hoop = {
  x: canvas.width - 120,
  y: canvas.height/2,
  r: 25
};

const keys = {};

window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

function movePlayer() {
  if(keys['w']) player.y -= player.speed;
  if(keys['s']) player.y += player.speed;
  if(keys['a']) player.x -= player.speed;
  if(keys['d']) player.x += player.speed;

  if(player.x < 20) player.x = 20;
  if(player.x > canvas.width-20) player.x = canvas.width-20;
  if(player.y < 20) player.y = 20;
  if(player.y > canvas.height-20) player.y = canvas.height-20;
}

function shootBall(){
  if(!ball.shot){
    ball.dx = 12;
    ball.dy = (hoop.y - ball.y)/20;
    ball.shot = true;
  }
}

function updateBall(){
  if(!ball.shot){
    ball.x = player.x;
    ball.y = player.y;
  } else {
    ball.x += ball.dx;
    ball.y += ball.dy;
  }

  const dist = Math.hypot(ball.x-hoop.x, ball.y-hoop.y);
  if(dist < hoop.r){
    score++;
    resetBall();
  }

  if(ball.x > canvas.width || ball.y < 0 || ball.y > canvas.height){
    resetBall();
  }
}

function resetBall(){
  ball.shot = false;
  ball.x = player.x;
  ball.y = player.y;
}

let score = 0;

function drawCourt(){
  ctx.fillStyle="#111";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.strokeStyle="#333";
  ctx.lineWidth=5;
  ctx.strokeRect(20,20,canvas.width-40,canvas.height-40);

  ctx.beginPath();
  ctx.arc(canvas.width/2,canvas.height/2,80,0,Math.PI*2);
  ctx.stroke();
}

function drawPlayer(){
  ctx.beginPath();
  ctx.arc(player.x,player.y,player.r,0,Math.PI*2);
  ctx.fillStyle=player.color;
  ctx.fill();
}

function drawBall(){
  ctx.beginPath();
  ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);
  ctx.fillStyle="orange";
  ctx.fill();
}

function drawHoop(){
  ctx.beginPath();
  ctx.arc(hoop.x,hoop.y,hoop.r,0,Math.PI*2);
  ctx.strokeStyle="red";
  ctx.lineWidth=5;
  ctx.stroke();
}

function drawScore(){
  ctx.fillStyle="#0ff";
  ctx.font="20px Arial";
  ctx.fillText("Score: "+score,30,40);
}

function update(){
  movePlayer();
  updateBall();
}

function draw(){
  drawCourt();
  drawHoop();
  drawPlayer();
  drawBall();
  drawScore();
}

function gameLoop(){
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

window.addEventListener("keydown", e => {
  if(e.code === "Space") shootBall();
});

gameLoop();
</script>

</body>
</html>
